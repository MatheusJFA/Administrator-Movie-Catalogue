plugins {
    id 'java'
}

group = 'com.matheusjfa.infrastructure'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':domain') // Adiciona dependência do módulo domain
    implementation project(':application') // Adiciona dependência do módulo application

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}